<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garaje Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="setup" class="w-full max-w-sm space-y-8">
        <div class="text-center">
            <h1 class="text-3xl font-black text-blue-500 tracking-tighter uppercase">Nube Activa</h1>
            <p class="text-slate-500 text-xs font-bold mt-2">Sincronización vía mi-garaje-app</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
            <div class="space-y-4">
                <input type="password" id="tk" placeholder="Pega el nuevo Token de GitHub" 
                       class="w-full p-4 bg-slate-900/50 rounded-2xl border border-slate-800 text-white text-center focus:border-blue-500 outline-none">
                
                <button onclick="conectar()" id="btn" 
                        class="w-full bg-blue-600 py-4 rounded-2xl font-black text-white shadow-lg active:scale-95 transition-all">
                    CONECTAR AHORA
                </button>
            </div>
        </div>
    </div>

    <div id="main" class="hidden w-full max-w-md">
        <div class="glass p-8 rounded-[3rem] mb-6 text-center border-b-4 border-b-blue-600">
            <p class="text-blue-400 text-[10px] font-black uppercase mb-2">Estado del Vehículo</p>
            <h2 class="text-6xl font-black tracking-tighter" id="km-display">0</h2>
            <p class="text-slate-500 text-sm mt-1 font-bold">KILÓMETROS</p>
            <button onclick="setKm()" class="mt-6 text-xs font-black bg-slate-800 px-6 py-2 rounded-full">ACTUALIZAR KM</button>
        </div>
        <div id="list" class="space-y-3"></div>
    </div>

    <script>
        // CONFIGURACIÓN CORREGIDA SEGÚN TU CAPTURA
        let conf = { u: 'Master3030', r: 'mi-garaje-app', t: '' };
        let db = { km: 0, parts: [], sha: '' };
        const FILE = 'garage_vault_pro.json';

        async function conectar() {
            const token = document.getElementById('tk').value.trim();
            if(!token) return alert("Ingresa el token");
            
            conf.t = token;
            const btn = document.getElementById('btn');
            btn.innerText = "SINCRO EN CURSO...";
            btn.disabled = true;

            const ok = await load();
            if(ok) { go(); } 
            else {
                const created = await save(true);
                if(created) go();
                else {
                    alert("Error: Verifica que el Token tenga permiso 'repo'.");
                    btn.innerText = "CONECTAR AHORA";
                    btn.disabled = false;
                }
            }
        }

        function go() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            render();
        }

        async function load() {
            try {
                const r = await fetch(`https://api.github.com/repos/${conf.u}/${conf.r}/contents/${FILE}`, {
                    headers: { 'Authorization': `Bearer ${conf.t}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if(r.ok) {
                    const j = await r.json();
                    db = JSON.parse(atob(j.content));
                    db.sha = j.sha;
                    return true;
                }
            } catch(e) {}
            return false;
        }

        async function save(init = false) {
            if(init) {
                db.parts = [
                    { n: "Aceite Motor", l: 10000, u: 0, i: "🛢️" },
                    { n: "Correa Distribución", l: 120000, u: 0, i: "⚙️" },
                    { n: "Bujías", l: 100000, u: 0, i: "⚡" },
                    { n: "Pastillas de Freno", l: 60000, u: 0, i: "🛑" }
                ];
            }

            try {
                const r = await fetch(`https://api.github.com/repos/${conf.u}/${conf.r}/contents/${FILE}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${conf.t}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Cloud Sync",
                        content: btoa(JSON.stringify(db, null, 2)),
                        sha: db.sha || undefined
                    })
                });
                if(r.ok) {
                    const j = await r.json();
                    db.sha = j.content.sha;
                    return true;
                }
            } catch(e) {}
            return false;
        }

        function setKm() {
            const n = prompt("Kilometraje actual:", db.km);
            if(n) { db.km = parseInt(n); save(); render(); }
        }

        function render() {
            document.getElementById('km-display').innerText = db.km.toLocaleString();
            const list = document.getElementById('list');
            list.innerHTML = '';
            db.parts.forEach((p, i) => {
                const diff = db.km - p.u;
                const pct = Math.min(100, (diff / p.l) * 100);
                list.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] flex flex-col gap-3">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-lg">${p.i} ${p.n}</span>
                            <button onclick="reset(${i})" class="text-[10px] font-black bg-blue-600/20 text-blue-400 px-3 py-1 rounded-lg">RESET</button>
                        </div>
                        <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden">
                            <div class="h-full ${pct > 90 ? 'bg-red-500' : 'bg-blue-500'} rounded-full" style="width:${pct}%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold text-slate-500">
                            <span>USO: ${diff} KM</span>
                            <span>LÍMITE: ${p.l} KM</span>
                        </div>
                    </div>`;
            });
        }

        function reset(i) {
            if(confirm("¿Confirmas el cambio?")) { db.parts[i].u = db.km; save(); render(); }
        }
    </script>
</body>
</html>
