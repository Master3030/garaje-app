<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Fleet v8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .active-tab { background: #3b82f6 !important; color: white !important; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        input, select { background: #0f172a !important; color: white !important; border: 1px solid #1e293b !important; }
        .modal { background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 animate-in fade-in duration-500">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center shadow-2xl border-t-4 border-blue-600">
            <h1 class="text-3xl font-black mb-8 tracking-tighter italic text-blue-500 uppercase">Flota Access</h1>
            <div class="space-y-4">
                <input type="text" id="u-in" placeholder="Usuario" class="w-full p-4 rounded-2xl outline-none text-center">
                <input type="password" id="p-in" placeholder="Contraseña" class="w-full p-4 rounded-2xl outline-none text-center">
                <button onclick="login()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all shadow-lg">Entrar</button>
            </div>
        </div>
    </div>

    <div id="selector-screen" class="hidden min-h-screen p-6 animate-in fade-in">
        <div class="max-w-md mx-auto space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black tracking-tighter uppercase italic">Mis Móviles</h2>
                <button onclick="addVehiculo()" class="bg-blue-600 w-12 h-12 rounded-2xl text-2xl font-bold">+</button>
            </div>
            <div id="vehiculos-list" class="grid gap-4"></div>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <header class="sticky top-0 z-50 glass p-4 flex justify-between items-center border-b border-white/5">
            <button onclick="backToSelector()" class="text-[10px] font-black uppercase bg-white/5 px-4 py-2 rounded-xl">⬅ Volver</button>
            <div class="flex gap-2">
                <button onclick="quickSave()" id="btn-save" class="text-[9px] font-black bg-blue-600 px-4 py-2 rounded-xl uppercase">Guardar</button>
                <button onclick="downloadPDF()" class="text-[9px] font-black bg-emerald-600 px-4 py-2 rounded-xl uppercase">PDF</button>
                <button onclick="logout()" class="text-[9px] font-black bg-red-600/20 text-red-400 px-4 py-2 rounded-xl uppercase">Salir</button>
            </div>
        </header>

        <main class="max-w-md mx-auto p-4 space-y-4">
            <div class="glass p-6 rounded-[2.5rem] relative overflow-hidden border-b-4 border-blue-500">
                <div class="flex justify-between items-start mb-4">
                    <div onclick="editCurrentVehiculo()" class="cursor-pointer">
                        <h3 id="v-info" class="font-black text-2xl tracking-tighter uppercase italic leading-none">---</h3>
                        <p id="v-chapa" class="text-blue-500 text-[10px] font-black tracking-widest mt-1 uppercase"></p>
                    </div>
                    <button onclick="deleteCurrentVehiculo()" class="text-red-800 text-[10px] font-black uppercase">Borrar</button>
                </div>
                <div class="flex justify-between items-end pt-2 border-t border-white/5">
                    <div onclick="editKm()" class="cursor-pointer">
                        <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">KM Actual</p>
                        <h2 id="d-km" class="text-3xl font-black italic">0 KM</h2>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] font-black text-slate-500 uppercase italic">Gasto Total</p>
                        <h2 id="d-total-gasto" class="text-xl font-black text-red-400">0</h2>
                    </div>
                </div>
            </div>

            <nav class="flex bg-slate-900 rounded-2xl p-1 gap-1 border border-white/5">
                <button onclick="tab('m')" id="t-m" class="flex-1 py-3 text-[9px] font-black uppercase rounded-xl active-tab">Mecánica</button>
                <button onclick="tab('e')" id="t-e" class="flex-1 py-3 text-[9px] font-black uppercase rounded-xl">Economía</button>
                <button onclick="tab('d')" id="t-d" class="flex-1 py-3 text-[9px] font-black uppercase rounded-xl">Papeles</button>
            </nav>

            <div id="s-m" class="space-y-3">
                <button onclick="addPart()" class="w-full py-4 border border-dashed border-white/10 rounded-2xl text-[9px] font-black uppercase text-slate-500">+ Agregar Repuesto</button>
                <div id="m-list" class="space-y-3"></div>
            </div>

            <div id="s-e" class="hidden space-y-3">
                <button onclick="addCombustible()" class="w-full py-6 bg-blue-600/10 text-blue-400 border border-blue-500/20 rounded-[2rem] text-[10px] font-black uppercase tracking-widest shadow-xl">⛽ Registrar Carga de Nafta</button>
                <div id="e-list" class="space-y-2"></div>
            </div>

            <div id="s-d" class="hidden space-y-3">
                <button onclick="addDoc()" class="w-full py-4 glass rounded-2xl text-[9px] font-black text-slate-400 uppercase tracking-widest">+ Nuevo Vencimiento</button>
                <div id="d-list" class="space-y-2"></div>
            </div>
        </main>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 z-[100] modal flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-8 rounded-[3rem] space-y-4">
            <h3 id="modal-title" class="text-xl font-black">Editar</h3>
            <div id="modal-fields" class="space-y-4"></div>
            <div class="flex gap-2 pt-4">
                <button onclick="closeModal()" class="flex-1 py-4 bg-slate-800 rounded-2xl font-black text-[10px] uppercase">Cancelar</button>
                <button id="modal-save-btn" class="flex-1 py-4 bg-blue-600 rounded-2xl font-black text-[10px] uppercase tracking-widest text-white">Aplicar</button>
            </div>
        </div>
    </div>

    <script>
        const AUTH = { u: "Flota", p: "Flotaadmin01", t: "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", repo: "Master3030/mi-garaje-app", path: "garage_vault_pro.json" };
        let db = { vehiculos: [] };
        let currentIdx = null;
        const fmt = new Intl.NumberFormat('es-PY', { style: 'currency', currency: 'PYG', maximumFractionDigits: 0 });

        async function login() {
            if(document.getElementById('u-in').value === AUTH.u && document.getElementById('p-in').value === AUTH.p) {
                if(await sync(false)) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('selector-screen').classList.remove('hidden');
                    renderVehiculos();
                }
            } else { alert("Acceso denegado"); }
        }

        async function sync(isSave = false) {
            const url = `https://api.github.com/repos/${AUTH.repo}/contents/${AUTH.path}`;
            const headers = { 'Authorization': `Bearer ${AUTH.t}`, 'Accept': 'application/vnd.github.v3+json' };
            try {
                const r = await fetch(url, { headers });
                if(r.ok) {
                    const j = await r.json();
                    if(isSave) {
                        const content = btoa(unescape(encodeURIComponent(JSON.stringify({vehiculos: db.vehiculos}))));
                        await fetch(url, { method: 'PUT', headers, body: JSON.stringify({ message: "Sync v8", content, sha: j.sha }) });
                        return true;
                    } else {
                        const data = JSON.parse(decodeURIComponent(escape(atob(j.content))));
                        db.vehiculos = data.vehiculos || [];
                        return true;
                    }
                }
            } catch(e) {} return false;
        }

        function renderVehiculos() {
            const list = document.getElementById('vehiculos-list'); list.innerHTML = '';
            db.vehiculos.forEach((v, i) => {
                list.innerHTML += `
                <div onclick="selectVehiculo(${i})" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 ${v.tipo==='Moto'?'border-amber-500':'border-blue-600'} active:scale-95 transition-all">
                    <div><h3 class="font-black text-xl italic uppercase">${v.marca}</h3><p class="text-[10px] font-black text-slate-500 uppercase">${v.chapa}</p></div>
                    <div class="text-right"><p class="text-xs font-black">${v.km.toLocaleString()} KM</p></div>
                </div>`;
            });
        }

        function render() {
            const v = db.vehiculos[currentIdx];
            document.getElementById('v-info').innerText = v.marca;
            document.getElementById('v-chapa').innerText = `${v.chapa} • ${v.tipo}`;
            document.getElementById('d-km').innerText = v.km.toLocaleString() + " KM";
            
            const totalGasto = v.gastos.reduce((a, b) => a + b.m, 0);
            document.getElementById('d-total-gasto').innerText = fmt.format(totalGasto);

            // Mecánica con Edición
            const mList = document.getElementById('m-list'); mList.innerHTML = '';
            v.parts.forEach((p, i) => {
                const uso = v.km - p.u; const pct = Math.min(100, (uso/p.l)*100);
                mList.innerHTML += `
                <div class="glass p-5 rounded-[2rem] border-l-4 ${pct>90?'border-red-500':'border-blue-500'}">
                    <div class="flex justify-between items-start mb-2">
                        <span onclick="editPart(${i})" class="text-[10px] font-black uppercase text-slate-400 cursor-pointer underline decoration-blue-500/30">${p.n}</span>
                        <div class="flex gap-3">
                            <button onclick="resetPart(${i})" class="text-[9px] font-black text-blue-500 uppercase">Reset</button>
                            <button onclick="deletePart(${i})" class="text-[9px] font-black text-red-900">✕</button>
                        </div>
                    </div>
                    <div class="h-1.5 bg-slate-900 rounded-full mb-2"><div class="h-full rounded-full bg-blue-600 transition-all duration-1000" style="width:${pct}%"></div></div>
                    <p class="text-[8px] font-black text-slate-500 uppercase">Restan: ${(p.l - uso).toLocaleString()} KM / Límite: ${p.l.toLocaleString()} KM</p>
                </div>`;
            });

            // Eficiencia
            const eList = document.getElementById('e-list'); eList.innerHTML = '';
            v.gastos.forEach((g, i) => {
                eList.innerHTML += `
                <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-blue-500">
                    <div><p class="text-[10px] font-black uppercase">${g.d}</p><p class="text-[8px] font-bold text-slate-500 italic">${g.f} ${g.r ? ' • '+g.r+' KM/L' : ''}</p></div>
                    <div class="flex items-center gap-4 text-right">
                        <p class="text-xs font-black text-red-400">${fmt.format(g.m)}</p>
                        <button onclick="deleteGasto(${i})" class="text-slate-800 text-xs font-bold">✕</button>
                    </div>
                </div>`;
            });

            // Papeles
            const dList = document.getElementById('d-list'); dList.innerHTML = '';
            v.docs.forEach((d, i) => {
                const days = Math.floor((new Date(d.v) - new Date()) / (1000*60*60*24));
                dList.innerHTML += `
                <div class="glass p-4 rounded-2xl flex justify-between items-center ${days<15?'border-red-500':'border-white/5'}">
                    <div><p class="text-[10px] font-black uppercase">${d.n}</p><p class="text-[8px] font-bold text-slate-500 italic">Vence: ${d.v}</p></div>
                    <div class="flex items-center gap-4"><span class="text-[9px] font-black uppercase ${days<15?'text-red-400':'text-slate-400'}">${days} DÍAS</span><button onclick="deleteDoc(${i})" class="text-slate-800 text-xs">✕</button></div>
                </div>`;
            });
        }

        // FUNCIONES DE EDICIÓN Y GESTIÓN
        function openModal(title, fields, onSave) {
            document.getElementById('modal-title').innerText = title;
            const fieldsContainer = document.getElementById('modal-fields');
            fieldsContainer.innerHTML = '';
            fields.forEach(f => {
                const input = document.createElement('input');
                input.type = f.type || 'text';
                input.id = f.id;
                input.value = f.value || '';
                input.placeholder = f.label;
                input.className = 'w-full p-4 rounded-xl outline-none';
                fieldsContainer.appendChild(input);
            });
            document.getElementById('modal-save-btn').onclick = () => { onSave(); closeModal(); };
            document.getElementById('edit-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        function editPart(i) {
            const p = db.vehiculos[currentIdx].parts[i];
            openModal("Editar Repuesto", [
                { id: 'ed-n', value: p.n, label: "Nombre" },
                { id: 'ed-l', value: p.l, label: "Límite KM", type: 'number' }
            ], () => {
                p.n = document.getElementById('ed-n').value;
                p.l = parseInt(document.getElementById('ed-l').value);
                render();
            });
        }

        function addVehiculo() {
            const marca = prompt("Marca/Modelo:");
            const chapa = prompt("Chapa:");
            const tipo = confirm("¿Es un AUTO? (Aceptar para Auto, Cancelar para Moto)") ? "Auto" : "Moto";
            if(marca && chapa) {
                const base = tipo === "Auto" ? 
                    [{n:"Aceite Motor", l:10000, u:0}, {n:"Correa Distribución", l:60000, u:0}] :
                    [{n:"Aceite 4T", l:3000, u:0}, {n:"Kit Transmisión", l:15000, u:0}];
                db.vehiculos.push({ marca, chapa, tipo, km: 0, lastKmFuel: 0, parts: base, gastos: [], docs: [] });
                sync(true).then(() => renderVehiculos());
            }
        }

        function addCombustible() {
            const v = db.vehiculos[currentIdx];
            const monto = prompt("Monto total pagado (Gs):");
            const precio = prompt("Precio por Litro (Gs):");
            const km = prompt("KM en tablero:", v.km);
            if(monto && precio && km) {
                const litros = parseFloat(monto) / parseFloat(precio);
                const kmC = parseInt(km);
                let rend = null;
                if(v.lastKmFuel > 0) rend = ((kmC - v.lastKmFuel) / litros).toFixed(2);
                v.km = kmC; v.lastKmFuel = kmC;
                v.gastos.unshift({ d: `Combustible (${litros.toFixed(2)}L)`, m: parseInt(monto), f: new Date().toLocaleDateString(), r: rend });
                render();
            }
        }

        function selectVehiculo(i) { currentIdx = i; document.getElementById('selector-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden'); render(); }
        function backToSelector() { document.getElementById('app-screen').classList.add('hidden'); document.getElementById('selector-screen').classList.remove('hidden'); renderVehiculos(); }
        function editKm() { const k = prompt("Corregir Odómetro:", db.vehiculos[currentIdx].km); if(k) { db.vehiculos[currentIdx].km = parseInt(k); render(); } }
        function resetPart(i) { if(confirm("¿Mantenimiento realizado?")) { db.vehiculos[currentIdx].parts[i].u = db.vehiculos[currentIdx].km; render(); } }
        function deleteCurrentVehiculo() { if(confirm("¿Borrar móvil definitivamente?")) { db.vehiculos.splice(currentIdx,1); sync(true).then(()=>backToSelector()); } }
        function deletePart(i) { db.vehiculos[currentIdx].parts.splice(i,1); render(); }
        function deleteGasto(i) { db.vehiculos[currentIdx].gastos.splice(i,1); render(); }
        function deleteDoc(i) { db.vehiculos[currentIdx].docs.splice(i,1); render(); }
        function addPart() { const n = prompt("Nombre:"); const l = prompt("Límite KM:"); if(n&&l) { db.vehiculos[currentIdx].parts.push({n, l:parseInt(l), u:db.vehiculos[currentIdx].km}); render(); } }
        function addDoc() { const n = prompt("Nombre:"); const v = prompt("Vence (AAAA-MM-DD):"); if(n&&v) { db.vehiculos[currentIdx].docs.push({n, v}); render(); } }
        async function quickSave() { const b = document.getElementById('btn-save'); b.innerText = "..."; if(await sync(true)) { b.innerText = "OK"; setTimeout(()=>b.innerText="Guardar",1000); } }
        function logout() { if(confirm("¿Guardar y Salir?")) sync(true).then(() => location.reload()); else location.reload(); }
        function tab(t) { ['m','e','d'].forEach(x => { document.getElementById('s-'+x).classList.toggle('hidden', x !== t); document.getElementById('t-'+x).classList.toggle('active-tab', x === t); }); }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const v = db.vehiculos[currentIdx];
            doc.setFontSize(22); doc.text("ESTADO TÉCNICO DE FLOTA", 20, 20);
            doc.setFontSize(10); doc.text(`Vehículo: ${v.marca} | Chapa: ${v.chapa} | Odómetro: ${v.km} KM`, 20, 30);
            doc.text("MANTENIMIENTO PREVENTIVO:", 20, 45);
            let y = 55;
            v.parts.forEach(p => { doc.text(`- ${p.n}: Faltan ${(p.l - (v.km - p.u))} KM para el servicio.`, 20, y); y += 8; });
            doc.save(`Flota_v8_${v.chapa}.pdf`);
        }
    </script>
</body>
</html>
