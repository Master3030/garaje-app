<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garaje Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="setup" class="w-full max-w-sm space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-black text-blue-500 tracking-tighter uppercase">Nube Activa</h1>
            <p class="text-slate-500 text-[10px] font-bold mt-2 uppercase tracking-widest">Sincronización mi-garaje-app</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
            <input type="password" id="tk" placeholder="Pega el nuevo Token aquí" 
                   class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 text-white text-center focus:border-blue-500 outline-none mb-4">
            
            <button onclick="conectar()" id="btn" 
                    class="w-full bg-blue-600 py-4 rounded-2xl font-black text-white shadow-lg active:scale-95 transition-all">
                CONECTAR AHORA
            </button>
        </div>
    </div>

    <div id="main" class="hidden w-full max-w-md">
        <div class="glass p-8 rounded-[3rem] mb-6 text-center border-b-4 border-b-blue-600 shadow-2xl">
            <h2 class="text-6xl font-black tracking-tighter" id="km-display">0</h2>
            <p class="text-slate-500 text-xs mt-1 font-black tracking-[0.2em] uppercase">Kilómetros Totales</p>
            <button onclick="setKm()" class="mt-6 text-[10px] font-black bg-blue-600/10 text-blue-400 px-6 py-2 rounded-full border border-blue-500/30">ACTUALIZAR</button>
        </div>
        <div id="list" class="grid gap-3"></div>
    </div>

    <script>
        let conf = { u: 'Master3030', r: 'mi-garaje-app', t: '' };
        let db = { km: 0, parts: [], sha: '' };
        const FILE = 'garage_vault_pro.json';

        async function conectar() {
            const token = document.getElementById('tk').value.trim();
            if(!token) return alert("Pega el token");
            
            conf.t = token;
            const btn = document.getElementById('btn');
            btn.innerText = "SINCRONIZANDO...";
            btn.disabled = true;

            const ok = await load();
            if(ok) {
                go();
            } else {
                const created = await save(true);
                if(created) {
                    go();
                } else {
                    alert("Error: GitHub rechazó la llave. Asegúrate de que el repositorio 'mi-garaje-app' no esté vacío (crea un README.md) y que el token sea nuevo.");
                    btn.innerText = "CONECTAR AHORA";
                    btn.disabled = false;
                }
            }
        }

        function go() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            render();
        }

        async function load() {
            try {
                const r = await fetch(`https://api.github.com/repos/${conf.u}/${conf.r}/contents/${FILE}`, {
                    headers: { 'Authorization': `token ${conf.t}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if(r.ok) {
                    const j = await r.json();
                    db = JSON.parse(atob(j.content));
                    db.sha = j.sha;
                    return true;
                }
            } catch(e) {}
            return false;
        }

        async function save(init = false) {
            if(init) {
                db.parts = [
                    { n: "Aceite Motor", l: 10000, u: 0, i: "🛢️" },
                    { n: "Correa Distribución", l: 120000, u: 0, i: "⚙️" },
                    { n: "Bujías", l: 100000, u: 0, i: "⚡" },
                    { n: "Discos Freno", l: 120000, u: 0, i: "💿" }
                ];
            }

            const body = {
                message: "Sync Garaje Pro",
                content: btoa(JSON.stringify(db, null, 2))
            };
            if(db.sha) body.sha = db.sha;

            try {
                const r = await fetch(`https://api.github.com/repos/${conf.u}/${conf.r}/contents/${FILE}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${conf.t}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if(r.ok) {
                    const j = await r.json();
                    db.sha = j.content.sha;
                    return true;
                }
            } catch(e) {}
            return false;
        }

        function setKm() {
            const n = prompt("KM Actual:", db.km);
            if(n) { db.km = parseInt(n); save(); render(); }
        }

        function render() {
            document.getElementById('km-display').innerText = db.km.toLocaleString();
            const list = document.getElementById('list');
            list.innerHTML = '';
            db.parts.forEach((p, i) => {
                const diff = db.km - p.u;
                const pct = Math.min(100, (diff / p.l) * 100);
                list.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-sm uppercase tracking-tight">${p.i} ${p.n}</span>
                            <button onclick="reset(${i})" class="text-[9px] font-black text-blue-400 bg-blue-400/10 px-3 py-1 rounded-lg">REINICIAR</button>
                        </div>
                        <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                            <div class="h-full ${pct > 90 ? 'bg-red-500 shadow-[0_0_10px_red]' : 'bg-blue-500'} transition-all" style="width:${pct}%"></div>
                        </div>
                        <div class="flex justify-between text-[9px] font-bold text-slate-500 uppercase">
                            <span>Uso: ${diff} KM</span>
                            <span>Límite: ${p.l} KM</span>
                        </div>
                    </div>`;
            });
        }

        function reset(i) {
            if(confirm("¿Confirmas el mantenimiento de esta pieza?")) {
                db.parts[i].u = db.km;
                save();
                render();
            }
        }
    </script>
</body>
</html>
