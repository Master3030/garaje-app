<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garaje Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="setup" class="w-full max-w-sm space-y-8 animate-in fade-in duration-500">
        <div class="text-center">
            <h1 class="text-3xl font-black text-blue-500 tracking-tighter uppercase">Nube Activa</h1>
            <p class="text-slate-500 text-xs font-bold mt-2 font-bold">Sincronización mi-garaje-app</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
            <input type="password" id="tk" placeholder="Pega el Token de GitHub" 
                   class="w-full p-4 bg-slate-900/50 rounded-2xl border border-slate-800 text-white text-center mb-4 focus:border-blue-500 outline-none">
            
            <button onclick="conectar()" id="btn" 
                    class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-white shadow-lg active:scale-95 transition-all">
                CONECTAR AL REPO
            </button>
        </div>
    </div>

    <div id="main" class="hidden w-full max-w-md animate-in slide-in-from-bottom duration-500">
        <div class="glass p-8 rounded-[3rem] mb-6 text-center border-b-4 border-b-blue-600 shadow-2xl">
            <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em] mb-2 font-bold">Kilometraje Actual</p>
            <h2 class="text-6xl font-black tracking-tighter text-white" id="km-display">0</h2>
            <button onclick="setKm()" class="mt-6 text-[10px] font-black bg-slate-800 px-6 py-2 rounded-full border border-slate-700 uppercase">Actualizar</button>
        </div>
        <div id="list" class="space-y-3"></div>
    </div>

    <script>
        let conf = { u: 'Master3030', r: 'mi-garaje-app', t: '' };
        let db = { km: 0, parts: [], sha: '' };
        const FILE = 'garage_vault_pro.json';

        async function conectar() {
            const token = document.getElementById('tk').value.trim();
            if(!token) return;
            
            conf.t = token;
            const btn = document.getElementById('btn');
            btn.innerText = "BUSCANDO DATOS...";
            btn.disabled = true;

            // Intentamos cargar
            const res = await load();
            if(res === "OK") {
                go();
            } else if(res === "NOT_FOUND") {
                btn.innerText = "CREANDO ARCHIVO...";
                const created = await save(true);
                if(created) go();
                else showError(btn);
            } else {
                showError(btn);
            }
        }

        function showError(btn) {
            alert("Error de conexión. Revisa el Token.");
            btn.innerText = "CONECTAR AL REPO";
            btn.disabled = false;
        }

        function go() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            render();
        }

        async function load() {
            try {
                const r = await fetch(`https://api.github.com/repos/${conf.u}/${conf.r}/contents/${FILE}`, {
                    headers: { 'Authorization': `Bearer ${conf.t}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if(r.ok) {
                    const j = await r.json();
                    db = JSON.parse(atob(j.content));
                    db.sha = j.sha;
                    return "OK";
                } else if(r.status === 404) {
                    return "NOT_FOUND";
                }
            } catch(e) {}
            return "ERROR";
        }

        async function save(init = false) {
            if(init) {
                db.parts = [
                    { n: "Aceite Motor", l: 10000, u: 0, i: "🛢️" },
                    { n: "Correa Distribución", l: 120000, u: 0, i: "⚙️" },
                    { n: "Bujías", l: 100000, u: 0, i: "⚡" },
                    { n: "Pastillas de Freno", l: 60000, u: 0, i: "🛑" }
                ];
            }

            try {
                const r = await fetch(`https://api.github.com/repos/${conf.u}/${conf.r}/contents/${FILE}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${conf.t}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Sync: " + new Date().toISOString(),
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                        sha: db.sha || undefined
                    })
                });
                if(r.ok) {
                    const j = await r.json();
                    db.sha = j.content.sha;
                    return true;
                }
            } catch(e) {}
            return false;
        }

        function setKm() {
            const n = prompt("Kilometraje actual:", db.km);
            if(n) { db.km = parseInt(n); save(); render(); }
        }

        function render() {
            document.getElementById('km-display').innerText = db.km.toLocaleString();
            const list = document.getElementById('list');
            list.innerHTML = '';
            db.parts.forEach((p, i) => {
                const diff = db.km - p.u;
                const pct = Math.min(100, (diff / p.l) * 100);
                list.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] shadow-lg">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-bold text-white/90">${p.i} ${p.n}</span>
                            <button onclick="reset(${i})" class="text-[9px] font-black bg-blue-600 px-3 py-1 rounded-lg uppercase">Reset</button>
                        </div>
                        <div class="w-full bg-slate-950 h-1.5 rounded-full overflow-hidden">
                            <div class="h-full ${pct > 90 ? 'bg-red-500' : 'bg-blue-500'} transition-all duration-700" style="width:${pct}%"></div>
                        </div>
                        <div class="flex justify-between text-[9px] font-black text-slate-500 mt-2 uppercase">
                            <span>Uso: ${diff} km</span>
                            <span>Vida: ${p.l} km</span>
                        </div>
                    </div>`;
            });
        }

        function reset(i) {
            if(confirm("¿Reiniciar " + db.parts[i].n + "?")) { db.parts[i].u = db.km; save(); render(); }
        }
    </script>
</body>
</html>
