<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garaje Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
    </style>
</head>
<body class="min-h-screen p-4">

    <div id="view-setup" class="max-w-md mx-auto space-y-6 pt-10">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-blue-500">Sincronización Cloud</h1>
            <p class="text-slate-400 text-sm">Configura tu conexión privada</p>
        </div>

        <div class="glass-card p-6 rounded-[2rem] space-y-4">
            <input type="password" id="input-token" placeholder="Pega tu Token aquí" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 text-white">
            <button onclick="configurarApp()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold shadow-lg">ACTIVAR NUBE</button>
        </div>
    </div>

    <div id="view-main" class="hidden max-w-md mx-auto">
        <div class="bg-blue-600 p-8 rounded-[2.5rem] mb-6 text-center shadow-2xl">
            <h2 class="text-4xl font-black" id="disp-km">0 KM</h2>
            <p class="text-blue-200 text-xs uppercase font-bold mt-2">Kilometraje Total</p>
        </div>
        <div id="parts-list" class="space-y-3"></div>
    </div>

    <script>
        // Esta es la parte clave: No guardamos el token como texto plano.
        let connection = { t: '', u: 'Master3030', r: 'mantenimiento' };
        let data = { lastKm: 0, parts: [] };

        async function configurarApp() {
            const rawToken = document.getElementById('input-token').value.trim();
            if(!rawToken) return alert("Ingresa el token");
            
            connection.t = rawToken;
            
            // Intentamos crear/leer el archivo en la nube
            const success = await sync(true);
            if(success) {
                document.getElementById('view-setup').classList.add('hidden');
                document.getElementById('view-main').classList.remove('hidden');
                alert("Conectado a la nube con éxito");
            } else {
                alert("Error de conexión. Verifica el token o que el repo 'mantenimiento' sea privado.");
            }
        }

        async function sync(isInit = false) {
            const fileName = 'garage_vault_pro.json';
            const url = `https://api.github.com/repos/${connection.u}/${connection.r}/contents/${fileName}`;
            
            // Si es la primera vez, creamos la estructura que pediste en el audio
            if(isInit) {
                data.parts = [
                    { n: "Aceite Motor", l: 10000, c: 0, i: "🛢️" },
                    { n: "Correa Distribución", l: 120000, c: 0, i: "⚙️" },
                    { n: "Bujías", l: 100000, c: 0, i: "⚡" },
                    { n: "Discos Freno", l: 120000, c: 0, i: "💿" }
                ];
            }

            try {
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${connection.t}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Cloud Sync",
                        content: btoa(JSON.stringify(data)),
                        sha: data.sha || null
                    })
                });
                
                if(res.ok) {
                    const resJson = await res.json();
                    data.sha = resJson.content.sha;
                    render();
                    return true;
                }
            } catch (e) { return false; }
        }

        function render() {
            document.getElementById('disp-km').innerText = data.lastKm + " KM";
            const list = document.getElementById('parts-list');
            list.innerHTML = '';
            data.parts.forEach(p => {
                list.innerHTML += `
                    <div class="glass-card p-4 rounded-2xl flex justify-between items-center">
                        <div>
                            <p class="font-bold">${p.i} ${p.n}</p>
                            <p class="text-xs text-slate-500">Límite: ${p.l} km</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-blue-400">${p.c} km</p>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
